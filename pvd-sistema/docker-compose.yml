# ═══════════════════════════════════════════════════════════════════════════
# LANCHE PDV SaaS — Docker Compose
# ═══════════════════════════════════════════════════════════════════════════
# Serviços:
#   - postgres  : banco de dados
#   - redis     : cache + sessions
#   - backend   : API Fastify + Socket.io
#   - frontend  : app React (Nginx)
#   - nginx     : reverse proxy na porta 80/443
#
# Uso:
#   cp .env.example .env       (edite as senhas!)
#   docker compose up -d
#   docker compose exec backend npx prisma migrate deploy
#   docker compose exec backend npm run prisma:seed
# ═══════════════════════════════════════════════════════════════════════════

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lanche-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lanche}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-troque_esta_senha}
      POSTGRES_DB: ${POSTGRES_DB:-lanche_pdv}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:15432:5432"   # porta 15432 no host (evita conflito com outros postgres)
    networks:
      - lanche-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lanche} -d ${POSTGRES_DB:-lanche_pdv}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lanche-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-troque_esta_senha}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:16379:6379"   # porta 16379 no host (evita conflito com outros redis)
    networks:
      - lanche-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-troque_esta_senha}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lanche-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3333
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-lanche}:${POSTGRES_PASSWORD:-troque_esta_senha}@postgres:5432/${POSTGRES_DB:-lanche_pdv}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-troque_esta_senha}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-1 minute}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lanche-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:3333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Worker: executa jobs em background (scheduler, trial expiration, stock alerts)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lanche-worker
    restart: unless-stopped
    command: ["node", "dist/workers/scheduler.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-lanche}:${POSTGRES_PASSWORD:-troque_esta_senha}@postgres:5432/${POSTGRES_DB:-lanche_pdv}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-troque_esta_senha}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lanche-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-/api/v1}
        VITE_SOCKET_URL: ${PUBLIC_SOCKET_URL:-/}
    container_name: lanche-frontend
    restart: unless-stopped
    networks:
      - lanche-net
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: lanche-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - lanche-net
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  lanche-net:
    driver: bridge
